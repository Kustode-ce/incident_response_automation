# Grafana Dashboards Provisioning

apiVersion: 1

providers:
  - name: 'Incident Response'
    orgId: 1
    folder: 'Incident Response'
    folderUid: incident-response
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
