# Redis Configuration for Incident Response Automation
# Local Development Settings

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Persistence
appendonly yes
appendfsync everysec
dir /data

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice

# Connection limits
maxclients 1000
timeout 300

# TCP keepalive
tcp-keepalive 300

# Snapshotting (backup)
save 900 1
save 300 10
save 60 10000

# Performance tuning
tcp-backlog 511
