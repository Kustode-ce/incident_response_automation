apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: incident-response

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secret.yaml
  - deployment-api.yaml
  - deployment-worker.yaml
  - deployment-beat.yaml
  - service-api.yaml
  - hpa-api.yaml
  - hpa-worker.yaml
  - ingress.yaml
  - servicemonitor.yaml

commonLabels:
  app.kubernetes.io/part-of: incident-response
  app.kubernetes.io/managed-by: kustomize

images:
  - name: incident-api
    newName: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/incident-api
    newTag: latest
  - name: incident-worker
    newName: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/incident-worker
    newTag: latest
