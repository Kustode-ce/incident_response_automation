version: '3.8'

services:
  # Business Intelligence Platform
  bi-platform:
    build:
      context: .
      dockerfile: Dockerfile.bi-platform
    container_name: bi-platform
    ports:
      - "8000:8000"  # API
      - "9090:9090"  # Metrics
    environment:
      # Application
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      
      # Database
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/bi_db
      - SQL_ECHO=false
      
      # Redis
      - REDIS_URL=redis://redis:6379/0
      
      # Authentication
      - JWT_SECRET_KEY=change-this-secret-key-in-production
      - JWT_ALGORITHM=HS256
      
      # ML Models
      - PRELOAD_MODELS=true
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      
      # Features
      - ENABLE_FORECASTING=true
      - ENABLE_HEALTH_SCORING=true
      - ENABLE_COST_INTELLIGENCE=true
      
      # Observability
      - ENABLE_METRICS=true
      - OTEL_SERVICE_NAME=bi-platform
    depends_on:
      - db
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: bi-platform-db
    environment:
      - POSTGRES_DB=bi_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: bi-platform-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Grafana for Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: bi-platform-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - ./deploy/grafana:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - bi-platform
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  grafana_data:
    driver: local

networks:
  default:
    name: bi-platform-network
