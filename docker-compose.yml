# Incident Response Automation - Local Development Stack
#
# Prerequisites:
#   1. Create the shared network (first time only):
#        docker network create kustode-shared
#   2. Ensure the medical_billing observability stack is running
#      (provides Prometheus, Loki, Grafana, Tempo, OTEL Collector).
#
# Usage:
#   docker-compose up --build
#
# The api and worker services connect to the shared kustode-shared network
# to reach the observability stack (prometheus:9090, loki:3100, etc.).

services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  db:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.db
    container_name: incident-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-incident_response}
      POSTGRES_USER: ${POSTGRES_USER:-incident_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-incident_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - incident-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-incident_user} -d ${POSTGRES_DB:-incident_response}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================
  # Redis Cache & Message Broker
  # ===========================================
  redis:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.redis
    container_name: incident-redis
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - incident-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ===========================================
  # API Service (FastAPI)
  # ===========================================
  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    container_name: incident-api
    environment:
      # Application
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      
      # Database
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-incident_user}:${POSTGRES_PASSWORD:-incident_pass}@db:5432/${POSTGRES_DB:-incident_response}
      - SQL_ECHO=${SQL_ECHO:-false}
      
      # Redis
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      
      # ML Providers (optional for local testing)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      
      # Feature Flags
      - ENABLE_ML_CLASSIFICATION=${ENABLE_ML_CLASSIFICATION:-false}
      - ENABLE_ML_ROOT_CAUSE=${ENABLE_ML_ROOT_CAUSE:-false}
      - ENABLE_METRICS=${ENABLE_METRICS:-true}
      - ENABLE_TELEMETRY=${ENABLE_TELEMETRY:-true}
      - DEMO_MODE=${DEMO_MODE:-false}
      
      # OpenTelemetry â€” defaults resolve via kustode-shared network to the
      # medical_billing observability stack; override for EKS cluster DNS.
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - OTEL_SERVICE_NAME=incident-api
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=incident-response,deployment.environment=${ENVIRONMENT:-development}
      - SERVICE_VERSION=1.0.0

      # Observability â€” shared stack provided by medical_billing
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://prometheus:9090}
      - LOKI_URL=${LOKI_URL:-http://loki:3100}
      - TEMPO_URL=${TEMPO_URL:-http://tempo:3200}
      - GRAFANA_URL=${GRAFANA_URL:-http://grafana:3000}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - SLACK_INCIDENTS_CHANNEL=${SLACK_INCIDENTS_CHANNEL:-#incidents}
      - JIRA_URL=${JIRA_URL:-}
      - JIRA_USERNAME=${JIRA_USERNAME:-}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
      - JIRA_PROJECT=${JIRA_PROJECT:-INC}
      - JIRA_ISSUE_TYPE=${JIRA_ISSUE_TYPE:-Bug}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO=${GITHUB_REPO:-}

      # Enrichment feature flags
      - ENABLE_OBSERVABILITY_ENRICHMENT=${ENABLE_OBSERVABILITY_ENRICHMENT:-true}
      - ENABLE_SLACK_NOTIFICATIONS=${ENABLE_SLACK_NOTIFICATIONS:-true}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # Mount source code for hot reload in development
      - ./src:/app/src
      - ./alembic:/app/alembic
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - incident-network
      - backend-observability
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Development mode: enable hot reload
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # ===========================================
  # Celery Worker (Background Tasks)
  # ===========================================
  worker:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.worker
    container_name: incident-worker
    environment:
      # Application
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      
      # Database
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-incident_user}:${POSTGRES_PASSWORD:-incident_pass}@db:5432/${POSTGRES_DB:-incident_response}
      
      # Redis
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      
      # ML Providers
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      
      # OpenTelemetry â€” shared stack
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - OTEL_SERVICE_NAME=incident-worker
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=incident-response,deployment.environment=${ENVIRONMENT:-development}
      - ENABLE_TELEMETRY=${ENABLE_TELEMETRY:-true}

      # Observability â€” shared stack provided by medical_billing
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://prometheus:9090}
      - LOKI_URL=${LOKI_URL:-http://loki:3100}
      - TEMPO_URL=${TEMPO_URL:-http://tempo:3200}
      - GRAFANA_URL=${GRAFANA_URL:-http://grafana:3000}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - SLACK_INCIDENTS_CHANNEL=${SLACK_INCIDENTS_CHANNEL:-#incidents}
      - JIRA_URL=${JIRA_URL:-}
      - JIRA_USERNAME=${JIRA_USERNAME:-}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
      - JIRA_PROJECT=${JIRA_PROJECT:-INC}
      - JIRA_ISSUE_TYPE=${JIRA_ISSUE_TYPE:-Bug}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO=${GITHUB_REPO:-}

      # Enrichment feature flags
      - ENABLE_OBSERVABILITY_ENRICHMENT=${ENABLE_OBSERVABILITY_ENRICHMENT:-true}
      - ENABLE_SLACK_NOTIFICATIONS=${ENABLE_SLACK_NOTIFICATIONS:-true}
    volumes:
      - ./src:/app/src:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - incident-network
      - backend-observability
    restart: unless-stopped
    # Run all queues in development
    command: celery -A src.workers.celery_app worker --loglevel=info --concurrency=2 -Q runbooks,notifications,ml,enrichment,celery

  # ===========================================
  # Celery Beat (Scheduled Tasks)
  # ===========================================
  beat:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.worker
    container_name: incident-beat
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./src:/app/src:ro
    depends_on:
      - worker
    networks:
      - incident-network
    restart: unless-stopped
    command: celery -A src.workers.celery_app beat --loglevel=info

  # ===========================================
  # Flower (Celery Monitoring) - Optional
  # ===========================================
  flower:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.worker
    container_name: incident-flower
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=5555
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      - redis
      - worker
    networks:
      - incident-network
    restart: unless-stopped
    command: celery -A src.workers.celery_app flower --port=5555
    profiles:
      - monitoring

# ===========================================
# Volumes
# ===========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ===========================================
# Networks
# ===========================================
networks:
  incident-network:
    name: incident-response-network
    driver: bridge

  # Shared network with the medical_billing observability stack (kustode-net).
  # For local development, create this network before starting both stacks:
  #   docker network create kustode-shared
  # In EKS this is unnecessary â€” services communicate via cluster DNS.
  backend-observability:
    name: kustode-shared
    external: true
